name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repo (seed/docs/branding)
        run: |
          python3 scripts/ci/validate_repo.py

  python-inference:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -r services/inference/requirements.txt

      - name: Pytest
        run: |
          cd services/inference
          pytest -q

  go-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Go test
        env:
          GOFLAGS: -mod=mod
        run: |
          cd services/api
          go test ./...

  e2e-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start dependencies (docker compose)
        run: |
          docker --version
          docker compose version
          docker compose -f infra/docker-compose.yml up -d
          docker compose -f infra/docker-compose.yml ps

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if docker compose -f infra/docker-compose.yml exec -T postgres pg_isready -U postgres -d miaodong; then
              echo "postgres ready"
              exit 0
            fi
            echo "waiting postgres... ($i)"
            sleep 2
          done
          echo "postgres not ready in time" >&2
          exit 1

      - name: Run migrations (goose)
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          export PATH="$(go env GOPATH)/bin:${PATH}"
          goose -dir services/api/migrations postgres "$MIAODONG_DSN" up

      - name: Import seed (generate SQL + psql)
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
        run: |
          cd services/api
          go run ./cmd/seed --out /tmp/miaodong-seed.sql
          psql "$MIAODONG_DSN" -f /tmp/miaodong-seed.sql
          psql "$MIAODONG_DSN" -c "select count(*) as problems_count from problems;"

      - name: "E2E: content api"
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
        run: |
          set -euo pipefail
          API_URL="http://127.0.0.1:8080"
          cd services/api
          
          # Start API in background
          go run ./cmd/api > /tmp/miaodong-api.log 2>&1 &
          API_PID=$!
          trap 'kill "$API_PID" >/dev/null 2>&1 || true' EXIT
          
          # Wait for /v1/health
          for i in {1..60}; do
            if curl -fsS "${API_URL}/v1/health" >/dev/null; then
              echo "api healthy"
              break
            fi
            echo "waiting api... ($i)"
            sleep 1
            if [ "$i" = "60" ]; then
              echo "api not healthy in time; logs:"
              tail -n 200 /tmp/miaodong-api.log || true
              exit 1
            fi
          done
          
          curl -fsS "${API_URL}/v1/problems?limit=3" > /tmp/problems.json
          python3 - <<'PY'
          import json
          
          d=json.load(open("/tmp/problems.json"))
          items=d.get("items",[])
          assert len(items)==3, items
          ids=[it.get("id") for it in items]
          assert any(i in ids for i in ["night_meow","cat_diarrhea","cat_vomit"]), ids
          assert d.get("content_version")==1, d.get("content_version")
          print("E2E content api: OK", ids)
          PY

      - name: "E2E: admin content crud"
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
        run: |
          set -euo pipefail
          API_URL="http://127.0.0.1:8080"
          ADMIN_TOKEN="dev-admin"
          cd services/api
          
          # Start API in background
          go run ./cmd/api > /tmp/miaodong-api.log 2>&1 &
          API_PID=$!
          trap 'kill "$API_PID" >/dev/null 2>&1 || true' EXIT
          
          # Wait for /v1/health
          for i in {1..60}; do
            if curl -fsS "${API_URL}/v1/health" >/dev/null; then
              echo "api healthy"
              break
            fi
            echo "waiting api... ($i)"
            sleep 1
            if [ "$i" = "60" ]; then
              echo "api not healthy in time; logs:"
              tail -n 200 /tmp/miaodong-api.log || true
              exit 1
            fi
          done
          
          API_URL="${API_URL}" ADMIN_TOKEN="${ADMIN_TOKEN}" python3 - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request
          import urllib.error
          
          api_url = os.environ.get("API_URL", "http://127.0.0.1:8080")
          admin_token = os.environ.get("ADMIN_TOKEN", "dev-admin")
          
          now_ms = int(time.time() * 1000)
          qid = f"q_ci_admin_{now_ms}"
          qtext = f"ci admin question {now_ms}"
          
          def http_json(method, path, body=None, headers=None):
            url = urllib.parse.urljoin(api_url, path)
            data = json.dumps(body).encode("utf-8") if body is not None else None
            req = urllib.request.Request(url, method=method, data=data)
            req.add_header("Content-Type", "application/json")
            for k, v in (headers or {}).items():
              req.add_header(k, v)
            try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                b = resp.read().decode("utf-8")
                return json.loads(b) if b else {}
            except urllib.error.HTTPError as e:
              b = e.read().decode("utf-8", errors="replace")
              raise SystemExit(f"HTTP {e.code} {method} {path}: {b}")
          
          # Pick one published problem_id from /v1/problems
          lp = http_json("GET", "/v1/problems?limit=1")
          items = lp.get("items") or []
          if not isinstance(items, list) or len(items) < 1 or not isinstance(items[0], dict) or not items[0].get("id"):
            raise SystemExit(f"expected /v1/problems?limit=1 to return items[0].id, got: {lp}")
          problem_id = str(items[0]["id"])
          
          # 1) POST /admin/questions (draft)
          r1 = http_json(
            "POST",
            "/admin/questions",
            {
              "actor": "ci",
              "id": qid,
              "problem_id": problem_id,
              "text": qtext,
              "type": "single_choice",
            },
            headers={"X-Admin-Token": admin_token},
          )
          assert r1.get("id") == qid, r1
          
          # 2) PATCH /admin/questions/{id} -> published
          r2 = http_json(
            "PATCH",
            f"/admin/questions/{qid}",
            {"actor": "ci", "status": "published"},
            headers={"X-Admin-Token": admin_token},
          )
          assert r2.get("ok") is True, r2
          
          # 3) GET /v1/problems/{problem_id} and assert questions contains the new item
          r3 = http_json("GET", f"/v1/problems/{problem_id}")
          bundle = r3.get("bundle") or {}
          qs = bundle.get("questions") or []
          if not isinstance(qs, list):
            raise SystemExit(f"expected bundle.questions to be list, got: {type(qs)}")
          
          found = None
          for q in qs:
            if isinstance(q, dict) and q.get("id") == qid:
              found = q
              break
          
          if not found:
            raise SystemExit(f"expected question {qid} in bundle.questions, got ids={[it.get('id') for it in qs if isinstance(it, dict)]}")
          
          assert found.get("status") == "published", found
          assert found.get("text") == qtext, found
          print("E2E admin content crud: OK", {"problem_id": problem_id, "qid": qid})
          PY

      - name: "E2E: content_version rollout"
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
        run: |
          set -euo pipefail
          API_URL="http://127.0.0.1:8080"
          ADMIN_TOKEN="dev-admin"
          cd services/api
          
          # Start API in background
          go run ./cmd/api > /tmp/miaodong-api.log 2>&1 &
          API_PID=$!
          trap 'kill "$API_PID" >/dev/null 2>&1 || true' EXIT
          
          # Wait for /v1/health
          for i in {1..60}; do
            if curl -fsS "${API_URL}/v1/health" >/dev/null; then
              echo "api healthy"
              break
            fi
            echo "waiting api... ($i)"
            sleep 1
            if [ "$i" = "60" ]; then
              echo "api not healthy in time; logs:"
              tail -n 200 /tmp/miaodong-api.log || true
              exit 1
            fi
          done
          
          API_URL="${API_URL}" ADMIN_TOKEN="${ADMIN_TOKEN}" python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          
          api_url = os.environ.get("API_URL", "http://127.0.0.1:8080")
          admin_token = os.environ.get("ADMIN_TOKEN", "dev-admin")
          
          def http_post_json(path: str, body: dict, headers: dict | None = None) -> dict:
            url = urllib.parse.urljoin(api_url, path)
            data = json.dumps(body).encode("utf-8")
            req = urllib.request.Request(url, method="POST", data=data)
            req.add_header("Content-Type", "application/json")
            for k, v in (headers or {}).items():
              req.add_header(k, v)
            with urllib.request.urlopen(req, timeout=10) as resp:
              b = resp.read().decode("utf-8")
              return json.loads(b) if b else {}
          
          def http_get_json(path: str, headers: dict | None = None) -> dict:
            url = urllib.parse.urljoin(api_url, path)
            req = urllib.request.Request(url, method="GET")
            for k, v in (headers or {}).items():
              req.add_header(k, v)
            with urllib.request.urlopen(req, timeout=10) as resp:
              return json.loads(resp.read().decode("utf-8"))
          
          # 1) publish v1 (100%)
          r1 = http_post_json(
            "/admin/release",
            {"actor": "ci", "rollout_percent": 100, "notes": "ci: publish v1 (100%)"},
            headers={"X-Admin-Token": admin_token},
          )
          cv1 = int(r1.get("content_version", 0) or 0)
          assert cv1 == 1, r1
          
          # 2) publish v2 (10%)
          r2 = http_post_json(
            "/admin/release",
            {"actor": "ci", "rollout_percent": 10, "notes": "ci: publish v2 (10%)"},
            headers={"X-Admin-Token": admin_token},
          )
          cv2 = int(r2.get("content_version", 0) or 0)
          assert cv2 == 2, r2
          
          # 3) 2 different Authorization tokens -> content_version in {1,2}
          a = http_get_json("/v1/problems?limit=1", headers={"Authorization": "Bearer dev-token-u_a"})
          b = http_get_json("/v1/problems?limit=1", headers={"Authorization": "Bearer dev-token-u_b"})
          cva = int(a.get("content_version", 0) or 0)
          cvb = int(b.get("content_version", 0) or 0)
          assert cva in (1, 2), a
          assert cvb in (1, 2), b
          print("rollout buckets", {"u_a": cva, "u_b": cvb})
          
          # 4) rollback to v1
          rb = http_post_json(
            "/admin/rollback",
            {"actor": "ci", "target_content_version": 1, "notes": "ci: rollback to v1"},
            headers={"X-Admin-Token": admin_token},
          )
          assert int(rb.get("content_version", 0) or 0) == 1, rb
          
          # 5) assert content_version == 1 after rollback
          after = http_get_json("/v1/problems?limit=1", headers={"Authorization": "Bearer dev-token-u_a"})
          assert int(after.get("content_version", 0) or 0) == 1, after
          print("E2E content_version rollout: OK")
          PY

      - name: "E2E: feedback & retest"
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
        run: |
          set -euo pipefail
          API_URL="http://127.0.0.1:8080"
          ADMIN_TOKEN="dev-admin"
          cd services/api
          
          # Start API in background
          go run ./cmd/api > /tmp/miaodong-api.log 2>&1 &
          API_PID=$!
          trap 'kill "$API_PID" >/dev/null 2>&1 || true' EXIT
          
          # Wait for /v1/health
          for i in {1..60}; do
            if curl -fsS "${API_URL}/v1/health" >/dev/null; then
              echo "api healthy"
              break
            fi
            echo "waiting api... ($i)"
            sleep 1
            if [ "$i" = "60" ]; then
              echo "api not healthy in time; logs:"
              tail -n 200 /tmp/miaodong-api.log || true
              exit 1
            fi
          done
          
          API_URL="${API_URL}" ADMIN_TOKEN="${ADMIN_TOKEN}" python3 - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request
          
          api_url = os.environ.get("API_URL", "http://127.0.0.1:8080")
          admin_token = os.environ.get("ADMIN_TOKEN", "dev-admin")
          
          now_ms = int(time.time() * 1000)
          from_ms = now_ms - 10 * 60 * 1000
          to_ms = now_ms + 10 * 60 * 1000
          
          def http_post_json(path: str, body: dict) -> dict:
            url = urllib.parse.urljoin(api_url, path)
            data = json.dumps(body).encode("utf-8")
            req = urllib.request.Request(url, method="POST", data=data)
            req.add_header("Content-Type", "application/json")
            with urllib.request.urlopen(req, timeout=10) as resp:
              b = resp.read().decode("utf-8")
              return json.loads(b) if b else {}
          
          def http_get_json(path: str, headers: dict | None = None) -> dict:
            url = urllib.parse.urljoin(api_url, path)
            req = urllib.request.Request(url, method="GET")
            for k, v in (headers or {}).items():
              req.add_header(k, v)
            with urllib.request.urlopen(req, timeout=10) as resp:
              return json.loads(resp.read().decode("utf-8"))
          
          # 1) 写入 feedback
          r = http_post_json("/v1/feedback", {
            "request_id": f"r_fb_{now_ms}",
            "helpful": True,
            "intent_match": "match",
            "notes": "ci e2e feedback",
            "problem_id": "night_meow",
            "content_version": 1,
          })
          assert r.get("ok") is True, r
          
          # 2) 写入 retest
          r = http_post_json("/v1/retest", {
            "problem_id": "night_meow",
            "baseline_request_id": f"r_old_{now_ms}",
            "current_request_id": f"r_new_{now_ms}",
            "content_version": 1,
            "notes": "ci e2e retest",
          })
          assert r.get("ok") is True, r
          
          # 3) 用 metrics 验证可统计
          q = urllib.parse.urlencode({"from_ts_ms": str(from_ms), "to_ts_ms": str(to_ms)})
          m = http_get_json(f"/admin/metrics?{q}", headers={"X-Admin-Token": admin_token})
          
          fb = m.get("feedback") or {}
          assert fb.get("total", 0) >= 1, fb
          assert fb.get("helpful_rate", 0) > 0, fb
          
          by_list = m.get("by_event_name") or []
          retest_cnt = 0
          for it in by_list:
            if isinstance(it, dict) and it.get("event_name") == "retest_submitted":
              retest_cnt = int(it.get("count", 0) or 0)
              break
          assert retest_cnt >= 1, by_list
          
          print("E2E feedback & retest: OK", {"feedback_total": fb.get("total"), "retest": retest_cnt})
          PY

      - name: "E2E: audit log"
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
        run: |
          set -euo pipefail
          API_URL="http://127.0.0.1:8080"
          ADMIN_TOKEN="dev-admin"

          cd services/api

          # Start API in background (required by plan: go run ./cmd/api)
          go run ./cmd/api > /tmp/miaodong-api.log 2>&1 &
          API_PID=$!
          trap 'kill "$API_PID" >/dev/null 2>&1 || true' EXIT

          # Wait for /v1/health
          for i in {1..60}; do
            if curl -fsS "${API_URL}/v1/health" >/dev/null; then
              echo "api healthy"
              break
            fi
            echo "waiting api... ($i)"
            sleep 1
            if [ "$i" = "60" ]; then
              echo "api not healthy in time; logs:"
              tail -n 200 /tmp/miaodong-api.log || true
              exit 1
            fi
          done

          # Trigger one audit write (POST /admin/release)
          curl -fsS -X POST "${API_URL}/admin/release" \
            -H "X-Admin-Token: ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"actor":"ci","rollout_percent":100,"notes":"ci e2e audit log"}' >/dev/null

          # Read audit list and assert fields
          AUDIT_JSON="$(curl -fsS "${API_URL}/admin/audit?limit=10" -H "X-Admin-Token: ${ADMIN_TOKEN}")"
          API_URL="${API_URL}" ADMIN_TOKEN="${ADMIN_TOKEN}" AUDIT_JSON="${AUDIT_JSON}" python3 - <<'PY'
          import json, os, subprocess
          
          api_url = os.environ.get("API_URL", "http://127.0.0.1:8080")
          admin_token = os.environ.get("ADMIN_TOKEN", "dev-admin")
          audit_json = os.environ["AUDIT_JSON"]
          
          data = json.loads(audit_json)
          items = data.get("items")
          if not isinstance(items, list) or len(items) < 1:
            raise SystemExit(f"expected items>=1, got: {items!r}")
          
          need = ["id", "actor", "action", "entity_type", "created_at"]
          for k in need:
            if k not in items[0]:
              raise SystemExit(f"missing field {k} in first item: {items[0]}")
          
          next_cursor = data.get("next_cursor")
          if next_cursor is not None:
            # verify requesting cursor does not error
            url = f"{api_url}/admin/audit?limit=10&cursor={next_cursor}"
            out = subprocess.check_output(
              ["curl", "-fsS", url, "-H", f"X-Admin-Token: {admin_token}"],
              text=True,
            )
            json.loads(out)
          
          print("E2E audit log: OK")
          PY

      - name: "E2E: metrics attribution"
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
        run: |
          set -euo pipefail
          API_URL="http://127.0.0.1:8080"
          ADMIN_TOKEN="dev-admin"
          PROBLEM_ID="night_meow"
          REQUEST_ID="r1"

          cd services/api

          # Start API in background
          go run ./cmd/api > /tmp/miaodong-api.log 2>&1 &
          API_PID=$!
          trap 'kill "$API_PID" >/dev/null 2>&1 || true' EXIT

          # Wait for /v1/health
          for i in {1..60}; do
            if curl -fsS "${API_URL}/v1/health" >/dev/null; then
              echo "api healthy"
              break
            fi
            echo "waiting api... ($i)"
            sleep 1
            if [ "$i" = "60" ]; then
              echo "api not healthy in time; logs:"
              tail -n 200 /tmp/miaodong-api.log || true
              exit 1
            fi
          done

          API_URL="${API_URL}" ADMIN_TOKEN="${ADMIN_TOKEN}" PROBLEM_ID="${PROBLEM_ID}" REQUEST_ID="${REQUEST_ID}" python3 - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request

          api_url = os.environ.get("API_URL", "http://127.0.0.1:8080")
          admin_token = os.environ.get("ADMIN_TOKEN", "dev-admin")
          problem_id = os.environ.get("PROBLEM_ID", "night_meow")
          request_id = os.environ.get("REQUEST_ID", "r1")

          def http_post_json(path: str, body: dict, headers: dict | None = None) -> dict:
            url = urllib.parse.urljoin(api_url, path)
            data = json.dumps(body).encode("utf-8")
            req = urllib.request.Request(url, method="POST", data=data)
            req.add_header("Content-Type", "application/json")
            for k, v in (headers or {}).items():
              req.add_header(k, v)
            with urllib.request.urlopen(req, timeout=10) as resp:
              return json.loads(resp.read().decode("utf-8"))

          def http_get_json(path: str, headers: dict | None = None) -> dict:
            url = urllib.parse.urljoin(api_url, path)
            req = urllib.request.Request(url, method="GET")
            for k, v in (headers or {}).items():
              req.add_header(k, v)
            with urllib.request.urlopen(req, timeout=10) as resp:
              return json.loads(resp.read().decode("utf-8"))

          now_ms = int(time.time() * 1000)
          from_ms = now_ms - 10_000
          to_ms = now_ms + 10_000

          # Write 3 events into the same window:
          # - r1 inference_started (with problem_id)
          # - r1 result_page_viewed (without problem_id, but with request_id)
          # - r1 feedback_submitted (helpful=true, can carry problem_id)
          events = [
            {
              "event_name": "inference_started",
              "ts_ms": now_ms,
              "user_id": "u_ci",
              "request_id": request_id,
              "payload": {"problem_id": problem_id},
            },
            {
              "event_name": "result_page_viewed",
              "ts_ms": now_ms,
              "user_id": "u_ci",
              "request_id": request_id,
              "payload": {},
            },
            {
              "event_name": "feedback_submitted",
              "ts_ms": now_ms,
              "user_id": "u_ci",
              "request_id": request_id,
              "payload": {"helpful": True, "problem_id": problem_id},
            },
          ]

          for e in events:
            out = http_post_json("/v1/analytics/event", e)
            if not out.get("ok"):
              raise SystemExit(f"expected ok=true, got: {out}")

          strict = http_get_json(
            f"/admin/metrics?from_ts_ms={from_ms}&to_ts_ms={to_ms}&problem_id={problem_id}&attribution=strict",
            headers={"X-Admin-Token": admin_token},
          )
          by_request = http_get_json(
            f"/admin/metrics?from_ts_ms={from_ms}&to_ts_ms={to_ms}&problem_id={problem_id}&attribution=by_request",
            headers={"X-Admin-Token": admin_token},
          )

          with open("/tmp/strict.json", "w", encoding="utf-8") as f:
            json.dump(strict, f)
          with open("/tmp/by_request.json", "w", encoding="utf-8") as f:
            json.dump(by_request, f)

          if by_request.get("events_total", 0) <= strict.get("events_total", 0):
            raise SystemExit(
              f"expected by_request.events_total > strict.events_total, got: "
              f"{by_request.get('events_total')} <= {strict.get('events_total')}"
            )

          print(
            "E2E metrics attribution: OK",
            "strict.events_total=",
            strict.get("events_total"),
            "by_request.events_total=",
            by_request.get("events_total"),
          )
          PY

      - name: "E2E: audio minio presign"
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
          # Force MinIO presign mode (no fallback)
          MIAODONG_AUDIO_STORAGE: minio-presign
          # MinIO config (docker compose service exposes localhost:9000)
          MIAODONG_MINIO_ENDPOINT: localhost:9000
          MIAODONG_MINIO_ACCESS_KEY: minio
          MIAODONG_MINIO_SECRET_KEY: minio123456
          MIAODONG_MINIO_BUCKET: miaodong-audio
          MIAODONG_MINIO_USE_SSL: "false"
        run: |
          set -euo pipefail
          API_URL="http://127.0.0.1:8080"

          # Wait for MinIO
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:9000/minio/health/ready" >/dev/null; then
              echo "minio ready"
              break
            fi
            echo "waiting minio... ($i)"
            sleep 1
            if [ "$i" = "60" ]; then
              echo "minio not ready in time" >&2
              exit 1
            fi
          done

          cd services/api

          # Start API in background
          go run ./cmd/api > /tmp/miaodong-api.log 2>&1 &
          API_PID=$!
          trap 'kill "$API_PID" >/dev/null 2>&1 || true' EXIT

          # Wait for /v1/health
          for i in {1..60}; do
            if curl -fsS "${API_URL}/v1/health" >/dev/null; then
              echo "api healthy"
              break
            fi
            echo "waiting api... ($i)"
            sleep 1
            if [ "$i" = "60" ]; then
              echo "api not healthy in time; logs:"
              tail -n 200 /tmp/miaodong-api.log || true
              exit 1
            fi
          done

          RESP="$(curl -fsS -X POST "${API_URL}/v1/audio/upload-url" -H "Content-Type: application/json" -d '{}' )"
          RESP="${RESP}" python3 - <<'PY' > /tmp/miaodong-audio-urls.txt
          import json
          import os
          data = json.loads(os.environ["RESP"])
          upload_url = data.get("upload_url")
          audio_url = data.get("audio_url")
          storage = data.get("storage")
          assert storage == "minio-presign", f"expected storage=minio-presign, got {storage!r}"
          assert upload_url, "missing upload_url"
          assert audio_url, "missing audio_url"
          print(upload_url)
          print(audio_url)
          PY

          UPLOAD_URL="$(python3 -c 'print(open("/tmp/miaodong-audio-urls.txt","r",encoding="utf-8").read().splitlines()[0])')"
          AUDIO_URL="$(python3 -c 'print(open("/tmp/miaodong-audio-urls.txt","r",encoding="utf-8").read().splitlines()[1])')"

          printf "meow-audio-test-%s" "$(date +%s)" > /tmp/sample.bin
          sha256sum /tmp/sample.bin | cut -d' ' -f1 > /tmp/sample.sha

          curl -fsS -X PUT "${UPLOAD_URL}" --data-binary "@/tmp/sample.bin" -H "Content-Type: application/octet-stream" >/dev/null
          curl -fsS "${AUDIO_URL}" -o /tmp/out.bin
          sha256sum /tmp/out.bin | cut -d' ' -f1 > /tmp/out.sha

          diff -u /tmp/sample.sha /tmp/out.sha
          echo "E2E audio minio presign: OK"

      - name: Tear down
        if: always()
        run: |
          docker compose -f infra/docker-compose.yml down -v
