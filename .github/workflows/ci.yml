name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repo (seed/docs/branding)
        run: |
          python3 scripts/ci/validate_repo.py

  python-inference:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -r services/inference/requirements.txt

      - name: Pytest
        run: |
          cd services/inference
          pytest -q

  go-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Go test
        env:
          GOFLAGS: -mod=mod
        run: |
          cd services/api
          go test ./...

  e2e-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start dependencies (docker compose)
        run: |
          docker --version
          docker compose version
          docker compose -f infra/docker-compose.yml up -d
          docker compose -f infra/docker-compose.yml ps

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if docker compose -f infra/docker-compose.yml exec -T postgres pg_isready -U postgres -d miaodong; then
              echo "postgres ready"
              exit 0
            fi
            echo "waiting postgres... ($i)"
            sleep 2
          done
          echo "postgres not ready in time" >&2
          exit 1

      - name: Run migrations (goose)
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          export PATH="$(go env GOPATH)/bin:${PATH}"
          goose -dir services/api/migrations postgres "$MIAODONG_DSN" up

      - name: Import seed (generate SQL + psql)
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
        run: |
          cd services/api
          go run ./cmd/seed --out /tmp/miaodong-seed.sql
          psql "$MIAODONG_DSN" -f /tmp/miaodong-seed.sql
          psql "$MIAODONG_DSN" -c "select count(*) as problems_count from problems;"

      - name: E2E: audit log
        env:
          MIAODONG_DSN: postgres://postgres:postgres@localhost:5432/miaodong?sslmode=disable
          GOFLAGS: -mod=mod
        run: |
          set -euo pipefail
          API_URL="http://127.0.0.1:8080"
          ADMIN_TOKEN="dev-admin"

          cd services/api

          # Start API in background (required by plan: go run ./cmd/api)
          go run ./cmd/api > /tmp/miaodong-api.log 2>&1 &
          API_PID=$!
          trap 'kill "$API_PID" >/dev/null 2>&1 || true' EXIT

          # Wait for /v1/health
          for i in {1..60}; do
            if curl -fsS "${API_URL}/v1/health" >/dev/null; then
              echo "api healthy"
              break
            fi
            echo "waiting api... ($i)"
            sleep 1
            if [ "$i" = "60" ]; then
              echo "api not healthy in time; logs:"
              tail -n 200 /tmp/miaodong-api.log || true
              exit 1
            fi
          done

          # Trigger one audit write (POST /admin/release)
          curl -fsS -X POST "${API_URL}/admin/release" \
            -H "X-Admin-Token: ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"actor":"ci","rollout_percent":100,"notes":"ci e2e audit log"}' >/dev/null

          # Read audit list and assert fields
          AUDIT_JSON="$(curl -fsS "${API_URL}/admin/audit?limit=10" -H "X-Admin-Token: ${ADMIN_TOKEN}")"
          API_URL="${API_URL}" ADMIN_TOKEN="${ADMIN_TOKEN}" AUDIT_JSON="${AUDIT_JSON}" python3 - <<'PY'
import json, os, subprocess

api_url = os.environ.get("API_URL", "http://127.0.0.1:8080")
admin_token = os.environ.get("ADMIN_TOKEN", "dev-admin")
audit_json = os.environ["AUDIT_JSON"]

data = json.loads(audit_json)
items = data.get("items")
if not isinstance(items, list) or len(items) < 1:
  raise SystemExit(f"expected items>=1, got: {items!r}")

need = ["id", "actor", "action", "entity_type", "created_at"]
for k in need:
  if k not in items[0]:
    raise SystemExit(f"missing field {k} in first item: {items[0]}")

next_cursor = data.get("next_cursor")
if next_cursor is not None:
  # verify requesting cursor does not error
  url = f"{api_url}/admin/audit?limit=10&cursor={next_cursor}"
  out = subprocess.check_output(
    ["curl", "-fsS", url, "-H", f"X-Admin-Token: {admin_token}"],
    text=True,
  )
  json.loads(out)

print("E2E audit log: OK")
PY

      - name: Tear down
        if: always()
        run: |
          docker compose -f infra/docker-compose.yml down -v
